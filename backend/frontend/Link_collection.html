<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Retro Site_Links</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1 class="title">リンク集</h1>
<hr>

<div class="layout">

  <!-- サイドバー -->
  <div id="sidebar-placeholder"></div>

  <!-- メイン本文 -->
  <div class="main_content center_text">
    <p>リンク集</p>
    <p>相互リンク募集中</p>
    <table>
      <tr>
        <td>
          <table class="profile_box">
            <tr>
              <th>サイト名</th>
              <th>URL</th>
              <th>説明</th>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </div>

  </div>
  <!-- 拍手用モーダル -->
  <div id="clap-overlay"></div>
  <div id="clap-modal">
  <h3>👏 拍手</h3>
  <p class="clap-modal-desc">管理人に一言メッセージをどうぞ！<br>(拍手だけでもOKです)</p>
  <textarea id="clap-message" class="clap-textarea"></textarea>
  <div class="flex-between">
    <button id="send-clap" class="flex-1 mr-5">送信</button>
    <button id="close-clap-modal" class="flex-1">閉じる</button>
  </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/top.js"></script>
  </body>
  </html>
