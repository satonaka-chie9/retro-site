<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Retro Site_Links</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1 class="title">リンク集</h1>
<hr>

<div class="layout">

  <!-- サイドバー -->
  <div class="side_menu">
    <a href="index.html">TOP</a>
    <a href="bbs.html">BBS</a>
    <a href="blog.html">日記</a>
    <a href="etchat.html">絵チャ</a>
    <a href="profile.html">PROFILE</a>
    
    <p class="menu_title">アクセスカウンタ</p>
    <div class="counter" id="counter">
      <span>000000</span>
    </div>
    <p class="menu_title">キリ番はBBSまたは拍手にて報告ください</p>
    
    <p class="menu_title">管理者用</p>
    <div id="admin-login-area">
      <input type="text" id="admin-user" placeholder="USER" class="admin-input"><br>
      <input type="password" id="admin-pass" placeholder="PASS" class="admin-input"><br>
      <button id="admin-login-btn">LOGIN</button>
      <div id="admin-msg" class="admin-msg-small"></div>
    </div>
    <div id="admin-logout-area" class="hidden"><p class="admin-login-status">管理者ログイン中</p><a href="admin_claps.html" class="admin-manage-link">拍手メッセージ管理</a>
      <button id="admin-logout-btn">LOGOUT</button>
    </div>

    <!-- Web拍手ボタン -->
    <div class="clap-btn-container">
      <span id="clap-count" class="clap-count-display">0 拍手</span>
      <a href="javascript:void(0)" class="clap-btn" id="open-clap-modal">拍手</a>
    </div>
    </div>
  <!-- メイン本文 -->
  <div class="main_content center_text">
    <p>リンク集</p>
    <p>相互リンク募集中</p>
    <table>
      <tr>
        <td>
          <table class="profile_box">
            <tr>
              <th>サイト名</th>
              <th>URL</th>
              <th>説明</th>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </div>

</div>
<!-- 拍手用モーダル -->
<div id="clap-overlay"></div>
<div id="clap-modal">
  <h3>👏 拍手</h3>
  <p class="clap-modal-desc">管理人に一言メッセージをどうぞ！<br>(拍手だけでもOKです)</p>
  <textarea id="clap-message" class="clap-textarea"></textarea>
  <div class="flex-between">
    <button id="send-clap" class="flex-1 mr-5">送信</button>
    <button id="close-clap-modal" class="flex-1">閉じる</button>
  </div>
</div>

<!-- top.jsの読み込み -->
<script src="/socket.io/socket.io.js"></script>
<script src="js/top.js"></script>
</body>
</html>
