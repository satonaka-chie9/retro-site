<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Retro Site - BBS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1 class="title">BBS</h1>
<hr>

<div class="layout">

  <!-- サイドバー -->
  <div class="side_menu">
    <a href="index.html">TOP</a>
    <a href="blog.html">BLOG</a>
    <a href="etchat.html">絵チャ</a>
    <a href="profile.html">PROFILE</a>

    <p class="menu_title">アクセスカウンタ</p>
    <div class="counter" id="counter">
      <span>000000</span>
    </div>
    <p class="menu_title">キリ番はBBSにて報告ください</p>

    <p class="menu_title">管理者用</p>
    <div id="admin-login-area">
      <input type="text" id="admin-user" placeholder="USER" style="width:80px; margin-bottom:5px;"><br>
      <input type="password" id="admin-pass" placeholder="PASS" style="width:80px; margin-bottom:5px;"><br>
      <button id="admin-login-btn">LOGIN</button>
      <div id="admin-msg" style="font-size:12px; color:#FF0000; margin-top:5px;"></div>
    </div>
    <div id="admin-logout-area" style="display:none;">
      <button id="admin-logout-btn">LOGOUT</button>
    </div>
    </div>
  <!-- メインコンテンツ -->
  <div class="main_content">

    <!-- 投稿一覧（ここにJSで差し込む） -->
    <div id="posts_container"></div>

    <!-- 投稿フォーム -->
    <div class="post_form">
      <h2>書き込みフォーム</h2>
      <form id="postForm">
        <div>
          名前：<input type="text" id="name" size="20" value="名無しさん">
        </div>

        <div>
          本文：<br>
          <textarea id="message" rows="5" cols="50" required></textarea>
        </div>

        <div>
          <input type="submit" value="書き込む">
          <input type="reset" value="リセット">
        </div>
      </form>
    </div>

  </div>

</div>

<script src="js/bbs.js"></script>
</body>
</html>
