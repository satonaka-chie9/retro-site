<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Retro Site - BBS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1 class="title">BBS</h1>
<hr>

<div class="layout">

  <!-- サイドバー -->
  <div id="sidebar-placeholder"></div>

  <!-- メインコンテンツ -->
  <div class="main_content">
    <p>むかしの掲示板を再現しました</p>
    <p>自由に話してください</p>
    <p>荒らしや誹謗中傷はやめてね！</p>

    <!-- 投稿一覧（ここにJSで差し込む） -->
    <div id="posts_container"></div>

    <!-- 投稿フォーム -->
    <div class="post_form">
      <h2>書き込みフォーム</h2>
      <form id="postForm">
        <div>
          名前：<input type="text" id="name" size="20" value="名無しさん">
        </div>

        <div>
          本文：<br>
          <textarea id="message" rows="5" cols="50" required></textarea>
        </div>

        <div>
          <input type="submit" value="書き込む">
          <input type="reset" value="リセット">
        </div>
      </form>
    </div>

  </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/bbs.js"></script>
  </body>
  </html>
