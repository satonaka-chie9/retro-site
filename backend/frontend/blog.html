<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Retro Site - 日記</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1 class="title">日記</h1></h1>
<hr>

<div class="layout">

  <!-- サイドバー -->
  <div id="sidebar-placeholder"></div>

  <!-- メインコンテンツ -->
  <div class="main_content">
    <p>この日記は管理人が不定期に更新していく予定です。</p>
    <p>昔の日記サイトをイメージして、画像とテキストが混在するスタイルで作成しました。</p>
    <p>みなさんも日記を楽しんでいただけると嬉しいです！</p>
    
    <!-- 管理者用投稿フォーム (デフォルト非表示) -->
    <div id="blog_post_form" class="post_form hidden">
      <h2>日記投稿（管理者専用）</h2>
      <form id="blogForm" enctype="multipart/form-data">
        <div>
          タイトル：<input type="text" id="blog_title" name="title" size="40" required>
        </div>
        <div class="mt-10">
          画像：
          <label for="blog_image" class="file-upload-label">ファイルを選択...</label>
          <input type="file" id="blog_image" name="image" accept="image/*" class="hidden">
          <span id="file_name_display" class="fs-11 ml-5 text-gray">選択されていません</span>
        </div>
        <div class="mt-10">
          本文：<br>
          <textarea id="blog_content" name="content" cols="60" rows="10" required></textarea>
        </div>
        <div class="mt-10">
          <input type="submit" value="投稿する">
        </div>
      </form>
    </div>

    <!-- ブログ記事一覧 -->
    <div id="blog_container">
      <p>読み込み中...</p>
    </div>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/blog.js"></script>
</body>
</html>
