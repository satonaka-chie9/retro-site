<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Retro Site - 日記</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1 class="title">BLOG</h1>
<hr>

<div class="layout">

  <!-- サイドバー -->
  <div class="side_menu">
    <a href="index.html">TOP</a>
    <a href="bbs.html">BBS</a>
    <a href="etchat.html">絵チャ</a>
    <a href="profile.html">PROFILE</a>
    <a href="Link_collection.html">リンク集</a>

    <p class="menu_title">アクセスカウンタ</p>
    <div class="counter" id="counter">
      <span>000000</span>
    </div>
    <p class="menu_title">キリ番はBBSまたは拍手にて報告ください</p>

    <p class="menu_title">管理者用</p>
    <div id="admin-login-area">
      <input type="text" id="admin-user" placeholder="USER" class="admin-input"><br>
      <input type="password" id="admin-pass" placeholder="PASS" class="admin-input"><br>
      <button id="admin-login-btn">LOGIN</button>
      <div id="admin-msg" class="admin-msg-small"></div>
    </div>
    <div id="admin-logout-area" class="hidden"><p class="admin-login-status">管理者ログイン中</p><a href="admin_claps.html" class="admin-manage-link">拍手メッセージ管理</a><a href="admin_manage.html" class="admin-manage-link">IP制限管理</a>
      <button id="admin-logout-btn">LOGOUT</button>
    </div>

    <!-- Web拍手ボタン -->
    <div class="clap-btn-container">
      <span id="clap-count" class="clap-count-display">0 拍手</span>
      <a href="javascript:void(0)" class="clap-btn" id="open-clap-modal">拍手</a>
    </div>
    </div>
  <!-- メインコンテンツ -->
  <div class="main_content">
    
    <!-- 管理者用投稿フォーム (デフォルト非表示) -->
    <div id="blog_post_form" class="post_form hidden">
      <h2>ブログ投稿（管理者専用）</h2>
      <form id="blogForm" enctype="multipart/form-data">
        <div>
          タイトル：<input type="text" id="blog_title" name="title" size="40" required>
        </div>
        <div class="mt-10">
          画像：
          <label for="blog_image" class="file-upload-label">ファイルを選択...</label>
          <input type="file" id="blog_image" name="image" accept="image/*" class="hidden">
          <span id="file_name_display" class="fs-11 ml-5 text-gray">選択されていません</span>
        </div>
        <div class="mt-10">
          本文：<br>
          <textarea id="blog_content" name="content" cols="60" rows="10" required></textarea>
        </div>
        <div class="mt-10">
          <input type="submit" value="投稿する">
        </div>
      </form>
    </div>

    <!-- ブログ記事一覧 -->
    <div id="blog_container">
      <p>読み込み中...</p>
    </div>

  </div>

</div>

<!-- 拍手用モーダル -->
<div id="clap-overlay"></div>
<div id="clap-modal">
  <h3>👏 拍手</h3>
  <p class="clap-modal-desc">管理人に一言メッセージをどうぞ！<br>(拍手だけでもOKです)</p>
  <textarea id="clap-message" class="clap-textarea"></textarea>
  <div class="flex-between">
    <button id="send-clap" class="flex-1 mr-5">送信</button>
    <button id="close-clap-modal" class="flex-1">閉じる</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/blog.js"></script>
</body>
</html>
