<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Retro Site</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Web拍手モーダル */
    #clap-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #000;
      border: 2px solid #00FF00;
      padding: 20px;
      z-index: 1000;
      width: 280px;
      box-shadow: 0 0 20px #00FF00;
    }
    #clap-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 999;
    }
    .clap-btn {
      display: block;
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      background: #000;
      color: #00FF00;
      border: 2px solid #00FF00;
      cursor: pointer;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
    }
    .clap-btn:hover {
      background: #003300;
    }
  </style>
</head>
<body>

<h1 class="title">Welcome to the Retro Site</h1>
<hr>

<div class="layout">

  <!-- サイドバー -->
  <div class="side_menu">
    <a href="bbs.html">BBS</a>
    <a href="blog.html">BLOG</a>
    <a href="etchat.html">絵チャ</a>
    <a href="profile.html">PROFILE</a>


    <p class="menu_title">アクセスカウンタ</p>
    <div class="counter" id="counter">
      <span>000000</span>
    </div>
    <p class="menu_title">キリ番はBBSにて報告ください</p>

    <p class="menu_title">管理者用</p>
    <div id="admin-login-area">
      <input type="text" id="admin-user" placeholder="USER" style="width:80px; margin-bottom:5px;"><br>
      <input type="password" id="admin-pass" placeholder="PASS" style="width:80px; margin-bottom:5px;"><br>
      <button id="admin-login-btn">LOGIN</button>
      <div id="admin-msg" style="font-size:12px; color:#FF0000; margin-top:5px;"></div>
    </div>
    <div id="admin-logout-area" style="display:none;">
      <button id="admin-logout-btn">LOGOUT</button>
    </div>

    <!-- Web拍手ボタン -->
    <div style="margin-top: 30px; border-top: 1px dashed #00FF00; padding-top: 10px;">
      <a href="javascript:void(0)" class="clap-btn" id="open-clap-modal">Web 拍手</a>
    </div>

  </div>

  <!-- 拍手用モーダル -->
  <div id="clap-overlay"></div>
  <div id="clap-modal">
    <h3 style="margin-top:0; color:#00FF00;">👏 Web 拍手</h3>
    <p style="font-size:12px;">管理人に一言メッセージをどうぞ！<br>(拍手だけでもOKです)</p>
    <textarea id="clap-message" style="width:100%; height:80px; background:#111; color:#00FF00; border:1px solid #00FF00; margin-bottom:10px;"></textarea>
    <div style="display:flex; justify-content:space-between;">
      <button id="send-clap" style="flex:1; margin-right:5px;">送信</button>
      <button id="close-clap-modal" style="flex:1;">閉じる</button>
    </div>
  </div>

  <!-- メイン本文 -->
  <div class="main_content">
    <p>管理人のsatonaka_chie9です。ふと昔のサイトを再現してみたくて作ってみました。</p>
    <p>みんな仲良くね！</p>
    <hr>
    <!-- お知らせ欄 -->
    <div id="news-section" style="margin-top: 20px; border: 1px double #00FF00; padding: 15px; background-color: #111;">
      <h3 style="color: #00FF00; margin-top: 0; border-bottom: 1px solid #00FF00;">◆ お知らせ</h3>
      
      <!-- 管理者用新規投稿フォーム (ログイン時のみ表示) -->
      <div id="news-post-area" style="display:none; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed #444;">
        <p style="color: #00FF00; font-size: 0.9em; margin-top: 0;">新規お知らせ投稿:</p>
        <textarea id="news-new-input" style="width: 100%; height: 60px; background-color: #222; color: #00FF00; border: 1px solid #00FF00; font-family: monospace;"></textarea>
        <button id="news-post-btn" style="margin-top: 5px;">投稿</button>
      </div>

      <!-- お知らせリスト表示エリア -->
      <div id="news-list">
        <p style="color: #888;">読み込み中...</p>
      </div>
    </div>
  </div>

</div>

<script src="js/top.js"></script>
</body>
</html>
