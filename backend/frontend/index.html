<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Retro Site</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1 class="title">Welcome to the Retro Site</h1>
<hr>

<div class="layout">

  <!-- サイドバー -->
  <div class="side_menu">
    <a href="bbs.html">BBS</a>
    <a href="blog.html">日記</a>
    <a href="etchat.html">絵チャ</a>
    <a href="profile.html">PROFILE</a>
    <a href="Link_collection.html">リンク集</a>


    <p class="menu_title">アクセスカウンタ</p>
    <div class="counter" id="counter">
      <span>000000</span>
    </div>
    <p class="menu_title">キリ番はBBSまたは拍手にて報告ください</p>

    <p class="menu_title">管理者用</p>
    <div id="admin-login-area">
      <input type="text" id="admin-user" placeholder="USER" class="admin-input"><br>
      <input type="password" id="admin-pass" placeholder="PASS" class="admin-input"><br>
      <button id="admin-login-btn">LOGIN</button>
      <div id="admin-msg" class="admin-msg-small"></div>
    </div>
    <div id="admin-logout-area" class="hidden">
      <p class="admin-login-status">管理者ログイン中</p>
      <a href="admin_claps.html" class="admin-manage-link">拍手メッセージ管理</a>
      <button id="admin-logout-btn">LOGOUT</button>
    </div>

    <!-- Web拍手ボタン -->
    <div class="clap-btn-container">
      <span id="clap-count" class="clap-count-display">0 拍手</span>
      <a href="javascript:void(0)" class="clap-btn" id="open-clap-modal">拍手</a>
    </div>
  </div>

  <!-- メイン本文 -->
  <div class="main_content">
    <p>管理人の空門チエです。ふと昔のサイトを再現してみたくて作ってみました。</p>
    <p>みんな仲良くね！</p>
    <hr>
    <!-- お知らせ欄 -->
    <div id="news-section" class="news-section">
      <h3>◆ お知らせ・更新履歴</h3>
      
      <!-- 管理者用新規投稿フォーム (ログイン時のみ表示) -->
      <div id="news-post-area" class="news-post-area">
        <p class="news-post-label">新規お知らせ投稿:</p>
        <textarea id="news-new-input" class="news-textarea"></textarea>
        <button id="news-post-btn" class="mt-5">投稿</button>
      </div>

      <!-- お知らせリスト表示エリア -->
      <div id="news-list">
        <p class="news-loading">読み込み中...</p>
      </div>
    </div>

    <!-- 近況報告欄 -->
    <div id="status-section" class="news-section">
      <h3>◆ 最近の近況</h3>
      
      <!-- 管理者用新規投稿フォーム (ログイン時のみ表示) -->
      <div id="status-post-area" class="news-post-area">
        <p class="news-post-label">新規近況投稿:</p>
        <textarea id="status-new-input" class="news-textarea"></textarea>
        <button id="status-post-btn" class="mt-5">投稿</button>
      </div>

      <!-- 近況リスト表示エリア -->
      <div id="status-list">
        <p class="news-loading">読み込み中...</p>
      </div>
    </div>
  </div>

</div>

<!-- 拍手用モーダル -->
<div id="clap-overlay"></div>
<div id="clap-modal">
  <h3>👏 拍手</h3>
  <p class="clap-modal-desc">管理人に一言メッセージをどうぞ！<br>(拍手だけでもOKです)</p>
  <textarea id="clap-message" class="clap-textarea"></textarea>
  <div class="flex-between">
    <button id="send-clap" class="flex-1 mr-5">送信</button>
    <button id="close-clap-modal" class="flex-1">閉じる</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/top.js"></script>
</body>
</html>
