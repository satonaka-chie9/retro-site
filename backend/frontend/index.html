<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Retro Site</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1 class="title">Welcome to the Retro Site</h1>
<hr>

<div class="layout">

  <!-- サイドバー -->
  <div id="sidebar-placeholder"></div>

  <!-- メイン本文 -->
  <div class="main_content">
    <p>管理人の空門チエです。ふと昔のサイトを再現してみたくて作ってみました。</p>
    <p>フロントエンドはレトロでバックエンドはモダンを意識して作成しました</p>
    <p>みんな仲良くね！</p>  

    <hr>
    <!-- お知らせ欄 -->
    <div id="news-section" class="news-section">
      <h3>◆ お知らせ・更新履歴</h3>

      <p>ここにサイトの更新履歴などを記載していきます</p>

      <!-- 管理者用新規投稿フォーム (ログイン時のみ表示) -->
      <div id="news-post-area" class="news-post-area">
        <p class="news-post-label">新規お知らせ投稿:</p>
        <textarea id="news-new-input" class="news-textarea"></textarea>
        <button id="news-post-btn" class="mt-5">投稿</button>
      </div>

      <!-- お知らせリスト表示エリア -->
      <div id="news-list">
        <p class="news-loading">読み込み中...</p>
      </div>
    </div>

    <!-- 近況報告欄 -->
    <div id="status-section" class="news-section">
      <h3>◆ 最近の近況</h3>

      <!-- 管理者用新規投稿フォーム (ログイン時のみ表示) -->
      <div id="status-post-area" class="news-post-area">
        <p class="news-post-label">新規近況投稿:</p>
        <textarea id="status-new-input" class="news-textarea"></textarea>
        <button id="status-post-btn" class="mt-5">投稿</button>
      </div>

      <!-- 近況リスト表示エリア -->
      <div id="status-list">
        <p class="news-loading">読み込み中...</p>
      </div>
    </div>
  </div>

  </div>

  <!-- 拍手用モーダル -->
  <div id="clap-overlay"></div>
  <div id="clap-modal">
  <h3>👏 拍手</h3>
  <p class="clap-modal-desc">管理人に一言メッセージをどうぞ！<br>(拍手だけでもOKです)</p>
  <textarea id="clap-message" class="clap-textarea"></textarea>
  <div class="flex-between">
    <button id="send-clap" class="flex-1 mr-5">送信</button>
    <button id="close-clap-modal" class="flex-1">閉じる</button>
  </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/top.js"></script>
  </body>
  </html>
