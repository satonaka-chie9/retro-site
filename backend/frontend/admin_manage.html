<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Retro Site - 管理パネル</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .manage-section {
      border: 1px solid #00FF00;
      padding: 15px;
      margin-bottom: 20px;
      background: #000;
    }
    .manage-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    .manage-table th, .manage-table td {
      border: 1px solid #00FF00;
      padding: 8px;
      text-align: left;
    }
    .ban-form {
      margin-bottom: 15px;
      padding: 10px;
      border: 1px dashed #00FF00;
    }
  </style>
</head>
<body>

<h1 class="title">管理者用管理パネル</h1>
<hr>

<div class="layout">
  <!-- サイドバー -->
  <div id="sidebar-placeholder"></div>

  <!-- メインコンテンツ -->
  <div class="main_content">
    <h2>◆ IP制限（アクセス禁止）管理</h2>
    
    <div class="manage-section">
      <div class="ban-form">
        <h3>新規制限追加</h3>
        IPアドレス: <input type="text" id="ban-ip" placeholder="127.0.0.1" class="admin-input" style="width: 150px;">
        理由: <input type="text" id="ban-reason" placeholder="荒らし等" class="admin-input" style="width: 200px;">
        <button id="add-ban-btn">制限を追加</button>
      </div>

      <h3>制限中IP一覧</h3>
      <table class="manage-table">
        <thead>
          <tr>
            <th>IPアドレス</th>
            <th>理由</th>
            <th>登録日</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="ban-list">
          <tr><td colspan="4">読み込み中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/admin_manage.js"></script>
</body>
</html>
