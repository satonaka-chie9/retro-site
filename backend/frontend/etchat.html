<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Retro Site - 絵チャ</title>
<link rel="stylesheet" href="css/style.css">

<!-- Fabric.js は使用せず、標準 Canvas API を使用 -->
<!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script> -->

<style>
/* 絵チャ専用レイアウト */
.draw_chat_wrapper {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  align-items: flex-start;
}

.draw_area {
  flex: 0 0 auto;
}

.controls {
  background: #1a1a1a;
  border: 2px solid #00FF00;
  padding: 10px;
  margin-bottom: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  align-items: center;
}

.control-group {
  display: flex;
  align-items: center;
  gap: 8px;
  border-right: 1px solid #333;
  padding-right: 15px;
}

.control-group:last-child {
  border-right: none;
}

.label {
  font-size: 12px;
  color: #00FF00;
  font-weight: bold;
}

.chat_area {
  flex: 1;
  min-width: 250px;
  border-left: 1px solid #333;
  padding-left: 15px;
  display: flex;
  flex-direction: column;
  height: 560px; /* canvas height + controls approx */
}

#chat_messages {
  flex: 1;
  border: 2px inset #666;
  background: black;
  color: #00ff00;
  font-family: 'Courier New', Courier, monospace;
  overflow-y: auto;
  padding: 10px;
  margin-bottom: 10px;
}

canvas {
  border: 2px solid #00FF00;
  background: #ffffff;
  cursor: crosshair;
}

.tool-btn.active {
  background-color: #00FF00;
  color: black;
  box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5);
}

.action-btn.danger:hover {
  background-color: #900;
  border-color: #f00;
  color: #fff;
}

#brushSize {
  width: 80px;
}
</style>
</head>
<body>

<h1 class="title">絵チャ</h1>
<hr>

<div class="layout">

  <!-- サイドバー（BBSと同じ） -->
  <div class="side_menu">
    <a href="index.html">TOP</a>
    <a href="bbs.html">BBS</a>
    <a href="blog.html">BLOG</a>
    <a href="profile.html">PROFILE</a>

    <p class="menu_title">アクセスカウンタ</p>
    <div class="counter" id="counter">
      <span>00000</span>
    </div>
    <p class="menu_title">キリ番はBBSにて報告ください</p>
  </div>

  <!-- メイン -->
  <div class="main_content">

    <div class="draw_chat_wrapper">

      <!-- 🎨 描画エリア -->
      <div class="draw_area">
        <div class="controls">
          <div class="control-group">
            <span class="label">設定:</span>
            <input type="color" id="colorPicker" value="#000000" title="色を選択">
            <input type="range" id="brushSize" min="1" max="20" value="3" title="太さを調整">
          </div>
          
          <div class="control-group">
            <span class="label">ツール:</span>
            <button id="btn_pen" class="tool-btn active" data-tool="pen">ペン</button>
            <button id="btn_line" class="tool-btn" data-tool="line">直線</button>
            <button id="btn_rect" class="tool-btn" data-tool="rect">四角</button>
            <button id="btn_fill" class="tool-btn" data-tool="fill">塗り</button>
            <button id="btn_eraser" class="tool-btn" data-tool="eraser">消しゴム</button>
          </div>

          <div class="control-group">
            <span class="label">操作:</span>
            <button id="btn_undo" class="action-btn">戻る</button>
            <button id="btn_redo" class="action-btn">進む</button>
            <button id="btn_clear" class="action-btn danger">全消し</button>
          </div>
        </div>
        <canvas id="c" width="600" height="500"></canvas>
      </div>

      <!-- 💬 チャットエリア -->
      <div class="chat_area">
        <div id="chat_messages"></div>

        <form id="chatForm">
          <input type="text" id="chatName" size="10" value="名無しさん">
          <input type="text" id="chatInput" size="20" required>
          <input type="submit" value="送信">
        </form>
      </div>

    </div>

  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/etchat.js"></script>

</body>
</html>
