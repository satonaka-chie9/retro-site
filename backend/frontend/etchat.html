<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Retro Site - 絵チャ</title>
<link rel="stylesheet" href="css/style.css">

<!-- Fabric -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

<style>
/* 絵チャ専用レイアウト */
.draw_chat_wrapper {
  display: flex;
  gap: 20px;
}

.draw_area {
  flex: 2;
}

.chat_area {
  flex: 1;
  border-left: 1px solid #999;
  padding-left: 10px;
  display: flex;
  flex-direction: column;
}

#chat_messages {
  flex: 1;
  border: 1px solid #aaa;
  background: white;
  overflow-y: auto;
  padding: 5px;
  margin-bottom: 10px;
}

canvas {
  border: 1px solid #aaa;
  background: white;
}
</style>
</head>
<body>

<h1 class="title">絵チャ</h1>
<hr>

<div class="layout">

  <!-- サイドバー（BBSと同じ） -->
  <div class="side_menu">
    <a href="index.html">TOP</a>
    <a href="#">PROFILE</a>
    <a href="#">GALLERY</a>

    <p class="menu_title">アクセスカウンタ</p>
    <div class="counter" id="counter">
      <span>0000</span>
    </div>
  </div>

  <!-- メイン -->
  <div class="main_content">

    <div class="draw_chat_wrapper">

      <!-- 🎨 描画エリア -->
      <div class="draw_area">
        <div>
          色：
          <input type="color" id="colorPicker" value="#000000">
          太さ：
          <input type="range" id="brushSize" min="1" max="20" value="3">
        </div>
        <br>
        <canvas id="c" width="600" height="500"></canvas>
      </div>

      <!-- 💬 チャットエリア -->
      <div class="chat_area">
        <div id="chat_messages"></div>

        <form id="chatForm">
          <input type="text" id="chatName" size="10" value="名無しさん">
          <input type="text" id="chatInput" size="20" required>
          <input type="submit" value="送信">
        </form>
      </div>

    </div>

  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/etchat.js"></script>

</body>
</html>
