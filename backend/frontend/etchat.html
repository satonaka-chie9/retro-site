<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Retro Site - 絵チャ</title>
<link rel="stylesheet" href="css/style.css">

<!-- Fabric.js は使用せず、標準 Canvas API を使用 -->
<!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script> -->

<style>
/* 絵チャ専用レイアウト */
.draw_chat_wrapper {
  display: flex;
  gap: 20px;
}

.draw_area {
  flex: 2;
}

.chat_area {
  flex: 1;
  border-left: 1px solid #999;
  padding-left: 10px;
  display: flex;
  flex-direction: column;
}

#chat_messages {
  flex: 1;
  border: 2px inset #666;
  background: black;
  color: #00ff00; /* レトロなグリーン文字 */
  font-family: 'Courier New', Courier, monospace;
  overflow-y: auto;
  padding: 10px;
  margin-bottom: 10px;
}

.chat_message_item {
  margin-bottom: 5px;
  border-bottom: 1px solid #333;
  padding-bottom: 2px;
}

canvas {
  border: 1px solid #aaa;
  background: white;
}
</style>
</head>
<body>

<h1 class="title">絵チャ</h1>
<hr>

<div class="layout">

  <!-- サイドバー（BBSと同じ） -->
  <div class="side_menu">
    <a href="index.html">TOP</a>
    <a href="bbs.html">BBS</a>
    <a href="profile.html">PROFILE</a>

    <p class="menu_title">アクセスカウンタ</p>
    <div class="counter" id="counter">
      <span>00000</span>
    </div>
  </div>

  <!-- メイン -->
  <div class="main_content">

    <div class="draw_chat_wrapper">

      <!-- 🎨 描画エリア -->
      <div class="draw_area">
        <div class="controls">
          色：<input type="color" id="colorPicker" value="#000000">
          太さ：<input type="range" id="brushSize" min="1" max="20" value="3">
          <button id="btn_pen">ペン</button>
          <button id="btn_eraser">消しゴム</button>
          ｜
          <button id="btn_undo">戻る</button>
          <button id="btn_redo">進む</button>
          <button id="btn_clear">全消し</button>
        </div>
        <br>
        <canvas id="c" width="600" height="500"></canvas>
      </div>

      <!-- 💬 チャットエリア -->
      <div class="chat_area">
        <div id="chat_messages"></div>

        <form id="chatForm">
          <input type="text" id="chatName" size="10" value="名無しさん">
          <input type="text" id="chatInput" size="20" required>
          <input type="submit" value="送信">
        </form>
      </div>

    </div>

  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/etchat.js"></script>

</body>
</html>
