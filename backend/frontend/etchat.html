<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Retro Site - 絵チャ</title>
<link rel="stylesheet" href="css/style.css">

<!-- Fabric.js は使用せず、標準 Canvas API を使用 -->
</head>
<body>

<h1 class="title">絵チャ</h1>
<hr>

<div class="layout">

  <!-- サイドバー（BBSと同じ） -->
  <div class="side_menu">
    <a href="index.html">TOP</a>
    <a href="bbs.html">BBS</a>
    <a href="blog.html">日記</a>
    <a href="profile.html">PROFILE</a>
    <a href="Link_collection.html">リンク集</a>
    
    <p class="menu_title">アクセスカウンタ</p>
    <div class="counter" id="counter">
      <span>00000</span>
    </div>
    <p class="menu_title">キリ番はBBSまたは拍手にて報告ください</p>

    <!-- Web拍手ボタン -->
    <div class="clap-btn-container">
      <span id="clap-count" class="clap-count-display">0 拍手</span>
      <a href="javascript:void(0)" class="clap-btn" id="open-clap-modal">拍手</a>
    </div>
  </div>


  <!-- メイン -->
  <div class="main_content">

    <div class="draw_chat_wrapper">

      <!-- 🎨 描画エリア -->
      <div class="draw_area">
        <div class="controls">
          <div class="control-group">
            <span class="label">設定:</span>
            <input type="color" id="colorPicker" value="#000000" title="色を選択">
            <input type="range" id="brushSize" min="1" max="20" value="3" title="太さを調整">
          </div>
          
          <div class="control-group">
            <span class="label">ツール:</span>
            <button id="btn_pen" class="tool-btn active" data-tool="pen">ペン</button>
            <button id="btn_line" class="tool-btn" data-tool="line">直線</button>
            <button id="btn_rect" class="tool-btn" data-tool="rect">四角</button>
            <button id="btn_fill" class="tool-btn" data-tool="fill">塗り</button>
            <button id="btn_eraser" class="tool-btn" data-tool="eraser">消しゴム</button>
          </div>

          <div class="control-group">
            <span class="label">操作:</span>
            <button id="btn_undo" class="action-btn">戻る</button>
            <button id="btn_redo" class="action-btn">進む</button>
            <button id="btn_clear" class="action-btn danger">全消し</button>
          </div>
        </div>
        <div id="canvas-container" style="position: relative; display: inline-block;">
          <canvas id="c" width="600" height="500"></canvas>
          <div id="brush-cursor"></div>
        </div>
      </div>

      <!-- 💬 チャットエリア -->
      <div class="chat_area">
        <div class="operation_guide">
          <p class="guide_title">【操作説明】</p>
          <ul class="guide_list">
            <li>ペン：マウスで自由描画</li>
            <li>直線/四角：ドラッグで描画</li>
            <li>塗り：クリックで塗りつぶし</li>
            <li>戻る/進む：1つ前の状態を同期</li>
            <li>全消し：キャンバスをリセット</li>
          </ul>
        </div>
        <div id="chat_messages"></div>

        <form id="chatForm">
          <input type="text" id="chatName" size="10" value="名無しさん">
          <input type="text" id="chatInput" size="20" required>
          <input type="submit" value="送信">
        </form>
      </div>

    </div>

  </div>
</div>

<!-- 拍手用モーダル -->
<div id="clap-overlay"></div>
<div id="clap-modal">
  <h3>👏 拍手</h3>
  <p class="clap-modal-desc">管理人に一言メッセージをどうぞ！<br>(拍手だけでもOKです)</p>
  <textarea id="clap-message" class="clap-textarea"></textarea>
  <div class="flex-between">
    <button id="send-clap" class="flex-1 mr-5">送信</button>
    <button id="close-clap-modal" class="flex-1">閉じる</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/etchat.js"></script>

</body>
</html>
